<div class="login-wrapper">
    <div class="gradient-bg"></div>
    
    <mat-card class="login-card animate-in">
        <mat-progress-bar mode="indeterminate" *ngIf="isLoading" class="loading-bar"></mat-progress-bar>
        
        <div class="card-header">
            <img src="assets/st2i_logo.png" alt="ST2I Logo" class="app-logo">
            <h1 class="app-title">ST2I Portal</h1>
            <p class="app-subtitle">Accédez à votre espace de gestion</p>
        </div>

        <mat-card-content>
            <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form">
                <mat-form-field appearance="outline" color="primary">
                    <mat-label>Email professionnel</mat-label>
                    <input matInput formControlName="email" type="email" placeholder="nom@st2i.com" required>
                    <mat-icon matPrefix>alternate_email</mat-icon>
                    <mat-error *ngIf="loginForm.get('email')?.hasError('email')">Format d'email invalide</mat-error>
                    <mat-error *ngIf="loginForm.get('email')?.hasError('required')">L'email est requis</mat-error>
                </mat-form-field>

                <mat-form-field appearance="outline" color="primary">
                    <mat-label>Mot de passe</mat-label>
                    <input matInput [type]="hidePassword ? 'password' : 'text'" formControlName="password" required>
                    <mat-icon matPrefix>lock_outline</mat-icon>
                    <button mat-icon-button matSuffix (click)="hidePassword = !hidePassword" [attr.aria-label]="'Afficher le mot de passe'" type="button">
                        <mat-icon>{{hidePassword ? 'visibility_off' : 'visibility'}}</mat-icon>
                    </button>
                    <mat-error *ngIf="loginForm.get('password')?.hasError('required')">Le mot de passe est obligatoire</mat-error>
                </mat-form-field>

                <button mat-flat-button color="primary" type="submit" [disabled]="loginForm.invalid || isLoading" class="submit-btn">
                    <span *ngIf="!isLoading">Se connecter</span>
                    <span *ngIf="isLoading">Authentification...</span>
                </button>
            </form>
        </mat-card-content>
        
        <mat-card-footer class="card-footer">
            <p>© 2026 ST2I • Système de Pointage Intelligent</p>
        </mat-card-footer>
    </mat-card>
</div>
