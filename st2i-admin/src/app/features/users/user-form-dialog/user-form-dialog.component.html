<h2 mat-dialog-title>{{ isEditMode ? 'Modifier l\'utilisateur' : 'Ajouter un utilisateur' }}</h2>
<mat-dialog-content>
  <form [formGroup]="userForm" class="form-container">
    <div class="row">
      <mat-form-field appearance="outline">
        <mat-label>Prénom</mat-label>
        <input matInput formControlName="prenom" placeholder="Ex. Jean">
      </mat-form-field>
      
      <mat-form-field appearance="outline">
        <mat-label>Nom</mat-label>
        <input matInput formControlName="nom" placeholder="Ex. Dupont">
      </mat-form-field>
    </div>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Email professionnel</mat-label>
      <input matInput formControlName="email" type="email" placeholder="jean.dupont@st2i.com">
      <mat-error *ngIf="userForm.get('email')?.hasError('email')">
        Veuillez entrer une adresse email valide
      </mat-error>
    </mat-form-field>

    <div class="row">
      <mat-form-field appearance="outline">
        <mat-label>Rôle</mat-label>
        <mat-select formControlName="role">
          <mat-option value="admin">Administrateur</mat-option>
          <mat-option value="employé">Employé</mat-option>
          <mat-option value="étudiant">Étudiant</mat-option>
        </mat-select>
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Statut</mat-label>
        <mat-select formControlName="statut">
          <mat-option value="actif">Actif</mat-option>
          <mat-option value="inactif">Inactif</mat-option>
        </mat-select>
      </mat-form-field>
    </div>

    <mat-form-field appearance="outline" class="full-width" *ngIf="!isEditMode">
      <mat-label>Mot de passe</mat-label>
      <input matInput formControlName="mot_de_passe" type="password">
      <mat-hint>Minimum 6 caractères</mat-hint>
    </mat-form-field>
  </form>

  <mat-progress-bar *ngIf="isLoading" mode="indeterminate" class="mt-16"></mat-progress-bar>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button mat-dialog-close>ANNULER</button>
  <button mat-flat-button color="primary" (click)="onSubmit()" [disabled]="userForm.invalid || isLoading">
    {{ isEditMode ? 'ENREGISTRER' : 'CRÉER L\'UTILISATEUR' }}
  </button>
</mat-dialog-actions>
