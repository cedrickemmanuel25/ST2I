<section class="hiw-section" id="how-it-works">
  <div class="section-header">
    <div class="section-eyebrow">Fonctionnement</div>
    <h2 class="section-title">Simple comme 1, 2, 3, 4</h2>
    <p class="section-desc">En moins de 5 minutes, votre équipe est opérationnelle.</p>
  </div>
  <div class="timeline">
    <div class="step" *ngFor="let step of steps; let last = last">
      <div class="step-left">
        <div class="step-num">{{ step.num }}</div>
        <div class="step-line" *ngIf="!last"></div>
      </div>
      <div class="step-card">
        <div class="step-icon">{{ step.icon }}</div>
        <div>
          <h3>{{ step.title }}</h3>
          <p>{{ step.description }}</p>
        </div>
      </div>
    </div>
  </div>
</section>
